name: Build ArisAuthme
on:
  push:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - run: mvn -B package --file pom.xml
    - uses: actions/upload-artifact@v4
      with:
        name: ArisAuthme-Jar
        path: target/*.jar
